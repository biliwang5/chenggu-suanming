        // 初始化年份选择
        function initYearSelect() {
            const yearSelect = document.getElementById('year');
            const currentYear = new Date().getFullYear();
            for (let year = 1924; year <= 2043; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.text = `${year}年 (${yearData[year].stem}${yearData[year].branch}年 - ${yearData[year].weight})`;
                if (year === currentYear) option.selected = true;
                yearSelect.appendChild(option);
            }
        }

        // 初始化日期选择
        function initDaySelect() {
            const daySelect = document.getElementById('day');
            for (let day = 1; day <= 30; day++) {
                const option = document.createElement('option');
                option.value = day;
                option.text = `${day}日 (${dayWeights[day-1]})`;
                daySelect.appendChild(option);
            }
        }

        // 转换重量为数字（两）
        function weightToNumber(weight) {
            let total = 0;
            const liangMatch = weight.match(/(\d+)两/);
            const qianMatch = weight.match(/(\d+)钱/);
            
            if (liangMatch) total += parseInt(liangMatch[1]);
            if (qianMatch) total += parseInt(qianMatch[1]) / 10;
            
            return total;
        }

        // 数字转换为重量显示
        function numberToWeight(num) {
            const liang = Math.floor(num);
            const qian = Math.round((num - liang) * 10);
            
            if (qian === 0) return `${liang}两`;
            if (liang === 0) return `${qian}钱`;
            return `${liang}两${qian}钱`;
        }

        // 获取命格批语
        function getFortune(totalWeight) {
            // 四舍五入到一位小数查找
            const key = Math.round(totalWeight * 10) / 10;
            const keyStr = key.toFixed(1);
            
            // 查找最接近的批语
            let fortune = fortuneTexts[keyStr];
            if (!fortune) {
                // 如果没有精确匹配，找最接近的
                const keys = Object.keys(fortuneTexts).map(k => parseFloat(k)).sort((a, b) => a - b);
                let closest = keys[0];
                let minDiff = Math.abs(key - closest);
                
                for (let k of keys) {
                    const diff = Math.abs(key - k);
                    if (diff < minDiff) {
                        minDiff = diff;
                        closest = k;
                    }
                }
                fortune = fortuneTexts[closest.toFixed(1)];
            }
            return fortune;
        }

        // 计算
        function calculate() {
            const year = parseInt(document.getElementById('year').value);
            const month = parseInt(document.getElementById('month').value);
            const day = parseInt(document.getElementById('day').value);
            const hour = parseInt(document.getElementById('hour').value);

            // 获取各部分骨重
            const yearW = yearData[year].weight;
            const monthW = monthWeights[month];
            const dayW = dayWeights[day - 1];
            const hourW = hourWeights[hour];

            // 转换为数字计算总和
            const yearNum = weightToNumber(yearW);
            const monthNum = weightToNumber(monthW);
            const dayNum = weightToNumber(dayW);
            const hourNum = weightToNumber(hourW);
            
            const totalNum = yearNum + monthNum + dayNum + hourNum;
            const totalW = numberToWeight(totalNum);

            // 显示结果
            document.getElementById('result').style.display = 'block';
            document.getElementById('lunarDate').textContent = 
                `农历：${yearData[year].stem}${yearData[year].branch}年 ${month}月 ${day}日 ${['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'][hour]}时`;
            
            document.getElementById('totalWeight').textContent = `总骨重：${totalW}`;
            document.getElementById('yearWeight').textContent = yearW;
            document.getElementById('monthWeight').textContent = monthW;
            document.getElementById('dayWeight').textContent = dayW;
            document.getElementById('hourWeight').textContent = hourW;
            
            document.getElementById('fortuneContent').innerHTML = 
                `<p style="text-indent: 2em; margin-bottom: 10px;">${getFortune(totalNum)}</p>
                 <p style="color: #e94560; margin-top: 15px; font-size: 0.9em;">* 注：此结果为传统命理文化参考，人生吉凶祸福还需自身努力与把握。</p>`;

            // 滚动到结果
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }

        // 页面加载时初始化
        window.onload = function() {
            initYearSelect();
            initDaySelect();
        };
    </script>
